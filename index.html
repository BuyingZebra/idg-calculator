<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IDG Calculator</title>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

<h1>IDG Calculator</h1>

<!-- ========================= -->
<!-- SECTION A (DOCKSIDE GRADING SUMMARY) -->
<!-- ========================= -->
<div class="section" id="sectionA">
  <h2>Dockside Grading Summary</h2>

  <div class="row"><span>Premium</span><input class="cat" data-name="Premium" type="number"></div>
  <div class="row"><span>Standard</span><input class="cat" data-name="Standard" type="number"></div>

  <div class="row"><span>Critical Weak</span><input class="cat" data-name="Critical Weak" type="number"></div>
  <div class="row"><span>Soft Shell</span><input class="cat" data-name="Soft Shell" type="number"></div>
  <div class="row"><span>Dead</span><input class="cat" data-name="Dead" type="number"></div>
  <div class="row"><span>Less than 3.74"</span><input class="cat" data-name="Undersize" type="number"></div>
  <div class="row"><span>Barn. / Tubeworm</span><input class="cat" data-name="Barnacles" type="number"></div>

  <h3>Results</h3>

  <div id="results"></div>

  <div class="button-row">
    <button onclick="runGrading()">Calculate</button>
    <button class="clear-btn" onclick="clearForm()">Clear</button>
  </div>
</div>

<!-- ========================= -->
<!-- SECTION B (LANDED POUNDS SUMMARY) -->
<!-- ========================= -->
<div class="section" id="sectionB">
  <h2>Landed Pounds Summary</h2>

  <div class="row">
    <span>Gross Pounds Landed</span>
    <input id="grossWeight" type="number">
  </div>

  <div class="row">
    <span>Total # of Pans</span>
    <input id="pans" type="number">
  </div>

  <div class="row">
    <span>Gross Lbs. Graded</span>
    <input id="grossSample" type="number" step="1">
  </div>

  <h3>Results</h3>

  <div id="landedResults"></div>

  <div class="button-row">
    <button onclick="SectionB.calculate()">Calculate</button>
    <button class="clear-btn" onclick="clearLanded()">Clear</button>
  </div>
</div>

<script src="app.js"></script>

</body>
</html>

<div id="formulaModal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeFormula()">×</span>
    <div id="formulaText"></div>
  </div>
</div>
